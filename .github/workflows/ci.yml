name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Synchronize locked environment
        run: uv sync --locked --all-extras --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linting
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v

      - name: Require reusable contract coverage
        run: uv run python tools/dev.py contract-coverage

      - name: Run Max-Cut quickstart smoke test
        run: uv run python demos/quickstart.py

      - name: Run portfolio smoke test
        run: uv run python demos/portfolio_vertical_slice.py

      - name: Build package
        run: uv build

      - name: Verify build outputs
        shell: bash
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"