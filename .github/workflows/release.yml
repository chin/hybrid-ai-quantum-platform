name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate release credential
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          test -n "$RELEASE_TOKEN" || {
            echo "::error::RELEASE_TOKEN repository secret is missing"
            exit 1
          }

      - name: Check out release branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - name: Pin checkout to triggering commit
        run: git reset --hard "${{ github.sha }}"

      - name: Determine and create version
        id: release
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          build: "true"
          changelog: "true"
          commit: "true"
          push: "true"
          tag: "true"
          vcs_release: "false"
          strict: true
          verbosity: "3"

      - name: Report release result
        env:
          RELEASED: ${{ steps.release.outputs.released }}
          PREVIOUS_VERSION: ${{ steps.release.outputs.previous_version }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          COMMIT_SHA: ${{ steps.release.outputs.commit_sha }}
        run: |
          printf 'released=%s\n' "$RELEASED"
          printf 'previous_version=%s\n' "$PREVIOUS_VERSION"
          printf 'version=%s\n' "$VERSION"
          printf 'tag=%s\n' "$TAG"
          printf 'commit_sha=%s\n' "$COMMIT_SHA"

          test "$RELEASED" = "true" || {
            echo "::error::Semantic Release completed without creating a version."
            exit 1
          }

      - name: Verify distributions
        if: steps.release.outputs.released == 'true'
        run: |
          test -d dist || {
            echo "::error::dist directory was not created"
            exit 1
          }

          find dist -maxdepth 1 -type f -print

          test -n "$(find dist -maxdepth 1 -type f -print -quit)" || {
            echo "::error::No distribution files were built"
            exit 1
          }

      - name: Create immutable GitHub Release with assets
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES: ${{ steps.release.outputs.release_notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release-notes.md

          gh release create "$TAG" \
            dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Verify published release assets
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          ASSET_COUNT="$(
            gh release view "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets | length'
          )"

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isImmutable,url,assets \
            --jq '{
              tag: .tagName,
              immutable: .isImmutable,
              url: .url,
              assets: [.assets[].name]
            }'

          test "$ASSET_COUNT" -gt 0 || {
            echo "::error::Published release contains no assets"
            exit 1
          }