name: Publish GitHub Package

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package
        required: true
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chin/optengine

jobs:
  package:
    name: Publish Container Package
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          tag="${RELEASE_TAG:-$INPUT_TAG}"

          test -n "$tag" || {
            echo "::error::No release tag was supplied"
            exit 1
          }

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing package for $tag"

      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Capture source revision
        id: source
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}

      - name: Build and publish container
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: true
          sbom: true

      - name: Generate package attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Report package
        env:
          TAG: ${{ steps.release.outputs.tag }}
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          printf 'package=%s/%s\n' "$REGISTRY" "$IMAGE_NAME"
          printf 'release_tag=%s\n' "$TAG"
          printf 'digest=%s\n' "$DIGEST"